---
layout: default
---
<section class="section section-reveal">
  <div class="container">
    <header class="section-header">
      <p class="eyebrow">{{ site.title }}</p>
      <h1>{{ page.title }}</h1>
      {% if page.lead %}
      <p>{{ page.lead }}</p>
      {% endif %}
    </header>
    <div class="content">
      {{ content }}
    </div>
  </div>
</section>
