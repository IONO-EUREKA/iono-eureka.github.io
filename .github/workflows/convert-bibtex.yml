name: Convert BibTeX to YAML

on:
  push:
    paths:
      - "_bibliography/export-bibtex.bib"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Convert BibTeX to YAML
        run: python scripts/ads_bib_to_yml.py _bibliography/export-bibtex.bib

      - name: Commit updated publications
        run: |
          if git diff --quiet -- _data/publications.yml; then
            echo "No changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/publications.yml
          git commit -m "chore(data): regenerate publications.yml from BibTeX"
          git push
